name: Create More Initial Issues
on:
  push:
    paths:
      - '.github/workflows/create-issues.yml'

permissions:
  issues: write

jobs:
  create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create --title "Add a fun fact to FUN_FACTS.md" --body "## Welcome!
          This is a fun beginner issue. Your task is to:
          1. Fork the repo.
          2. Create a new file called \`FUN_FACTS.md\` (or edit it if it exists).
          3. Add a random fun fact about technology or programming!
          4. Submit a Pull Request.
          
          Once merged, you'll earn your Awesome OSS Contributor Badge!" --label "good first issue" || echo "Failed to create issue 4"
          
          gh issue create --title "Share your favorite quote in QUOTES.md" --body "## Welcome!
          Inspire others with your first contribution! Your task is to:
          1. Fork this repo.
          2. Create or edit \`QUOTES.md\`.
          3. Add your favorite programming quote and the author.
          4. Submit a Pull Request!
          
          Once merged, you'll earn your Awesome OSS Contributor Badge!" --label "good first issue" || echo "Failed to create issue 5"
          
          gh issue create --title "Add a learning resource to RESOURCES.md" --body "## Welcome!
          Help others learn! Your task is to:
          1. Fork the repo.
          2. Create or edit \`RESOURCES.md\`.
          3. Add a link to a tutorial, blog, or video that helped you learn to code.
          4. Submit a Pull Request.
          
          Once merged, you'll earn your Awesome OSS Contributor Badge!" --label "good first issue" || echo "Failed to create issue 6"
